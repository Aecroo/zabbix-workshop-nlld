services:
  zabbix-workshop-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: zabbix-workshop/nlld-api:latest
    container_name: zabbix-workshop-api
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - API_HOST=0.0.0.0
      - DEBUG=false
      - CONFIG_PATH=/config/default.yaml
    volumes:
      - ./config:/config:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
