# Zabbix Workshop Mock Data API Configuration
# This file defines the buildings, rooms, and sensors for the mock data API.
# Edit this file to customize your workshop environment.
#
# IDs are now autogenerated:
#   - Buildings: 10-99 (in order of appearance)
#   - Rooms: 100-999 (in order of appearance across all buildings)
#   - Sensors: 1000-9999 (in order of appearance within each room)
#
# Sensor types (metrics are fused into single readings):
#   - environment: Returns temperature °C, humidity %, CO2 ppm in one reading
#   - power: Returns voltage V, current A, power W, energy kWh in one reading

buildings:
  - name: "HQ Building"
    description: "Main headquarters with all departments"
    address: "Tech Park 1, Berlin"
    rooms:
      - name: "Training Room A"
        type: training_room
        floor: 1
        capacity: 30
        sensors:
          - name: "Environment Sensor - Front"
            type: environment
            description: "Environmental monitoring at front of room"

      - name: "Training Room B"
        type: training_room
        floor: 1
        capacity: 25
        sensors:
          - name: "Environment Sensor - Back"
            type: environment
            description: "Environmental monitoring at back of room"

      - name: "Open Office East"
        type: office
